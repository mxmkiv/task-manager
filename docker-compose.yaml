services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${DB_USER} -d ${DB_NAME} -p ${DB_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "${EXTERNAL_DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgres
      - ./migration/001_init.up.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: